<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Connected Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Page Visit Counter -->
    <div class="absolute top-4 right-4 bg-white px-4 py-2 rounded-full shadow-md text-sm font-semibold text-slate-700 flex items-center gap-2">
        <span>Visits:</span>
        <span id="visit-counter" class="text-blue-600">...</span>
    </div>

    <main class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
        <a href="https://www.linkedin.com/in/chrisjsebastian/" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-2 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300 transform hover:-translate-y-0.5 shadow-md">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
            Connect on LinkedIn
        </a>
        
        <!-- Random Quote Container -->
        <div class="mt-8 pt-6 border-t border-slate-200">
            <blockquote class="italic text-slate-600 mb-2">
                "<span id="quote-text">Loading quote...</span>"
            </blockquote>
            <p class="text-sm text-slate-500 font-semibold">- <span id="quote-author">FavQs</span></p>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
